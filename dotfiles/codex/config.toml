model = "gpt-5.4"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
approvals_reviewer = "user"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.chrome-devtools.tools.take_screenshot]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.take_snapshot]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.navigate_page]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.evaluate_script]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.new_page]
approval_mode = "approve"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[projects."/Users/johnwu/code/zk/legit-poker"]
trust_level = "trusted"

[projects."/Users/johnwu/code/zk/Spartan2"]
trust_level = "trusted"

[projects."/Users/johnwu/code/ai-agent-autoimprove"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[plugins."game-studio@openai-curated"]
enabled = true

[plugins."jam@openai-curated"]
enabled = true
